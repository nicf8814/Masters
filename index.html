<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>The Masters 2025 — Friend Group Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --masters-green: #1a4a2e;
    --masters-green-mid: #2d6b47;
    --masters-green-light: #3d8b5e;
    --masters-gold: #c9a84c;
    --masters-gold-light: #e8c97a;
    --masters-cream: #f5f0e8;
    --masters-white: #fdfaf5;
    --masters-dark: #0d2417;
    --red: #c0392b;
    --red-light: #e74c3c;
    --shadow: 0 4px 24px rgba(0,0,0,0.18);

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--masters-dark);

    color: var(--masters-cream);

    min-height: 100vh;
  }
  header {
    background: linear-gradient(180deg, #0a1a0f 0%, var(--masters-dark) 100%);
    border-bottom: 2px solid var(--masters-gold);

    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.04) 60px, rgba(201,168,76,0.04) 61px);
    pointer-events: none;

  .header-badge {
    display: inline-block;
    border: 1px solid var(--masters-gold);

  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);

  }
  header h1 span { color: var(--masters-gold); font-style: italic; }
  .header-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; letter-spacing: 2px;
    color: var(--masters-gold-light);
    margin-top: 6px; text-transform: uppercase; opacity: 0.8;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;

  .last-updated {
    font-family: 'Montserrat', sans-serif; font-size: 10px;

  }
  .header-controls {
    display: flex; align-items: center; justify-content: center;

  }
  .refresh-btn {
    background: none; border: 1px solid rgba(201,168,76,0.35);

    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;

  }
  .refresh-btn:hover { background: rgba(201,168,76,0.1); }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px 60px; }
  .pots-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 600px) { .pots-row { grid-template-columns: 1fr; } }
  .pot-card {
    background: linear-gradient(135deg, rgba(45,107,71,0.25), rgba(13,36,23,0.6));
    border: 1px solid rgba(201,168,76,0.35);
    padding: 20px 24px; text-align: center; position: relative; overflow: hidden;
  }
  .pot-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--masters-gold), transparent);
  }
  .pot-label { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--masters-gold); margin-bottom: 6px; }
  .pot-amount { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--masters-gold-light); }
  .pot-leader { font-size: 13px; color: rgba(245,240,232,0.7); margin-top: 4px; font-style: italic; }
  .pot-leader strong { color: var(--masters-cream); font-style: normal; }
  .section-title {
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600;
    color: var(--masters-gold); border-bottom: 1px solid rgba(201,168,76,0.3);

  .section-title .pill {

    text-transform: uppercase; background: var(--masters-green); color: var(--masters-gold);
    padding: 3px 10px; border: 1px solid rgba(201,168,76,0.4);
  }
  .standings-section { margin-bottom: 36px; }
  .standings-grid { display: grid; gap: 10px; }
  .player-card {
    background: rgba(13,36,23,0.7); border: 1px solid rgba(201,168,76,0.15);
    padding: 14px 18px; display: grid;
    grid-template-columns: 36px 1fr auto auto auto;

  .player-card:hover { border-color: rgba(201,168,76,0.45); background: rgba(26,74,46,0.35); }
  .player-card.rank-1 { border-color: rgba(201,168,76,0.6); background: rgba(45,107,71,0.3); }
  .player-card.rank-2 { border-color: rgba(201,168,76,0.35); }
  .player-card.rank-3 { border-color: rgba(201,168,76,0.25); }
  @keyframes alert-glow { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0)} 50%{box-shadow:0 0 16px 2px rgba(192,57,43,0.3)} }
  .rank-num { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600; color: var(--masters-gold); text-align: center; opacity: 0.8; }
  .rank-1 .rank-num { opacity: 1; font-size: 22px; }
  .player-info { min-width: 0; }

  .player-golfers { font-family: 'Montserrat', sans-serif; font-size: 10px; color: rgba(245,240,232,0.5); margin-top: 3px; line-height: 1.5; }
  .golfer-tag { display: inline-block; margin-right: 4px; margin-bottom: 2px; }
  .golfer-score-inline { font-size: 10px; font-family: 'Montserrat', sans-serif; padding: 1px 5px; border-radius: 2px; }
  .golfer-score-inline.under { background: rgba(45,107,71,0.5); color: #7ec99a; }
  .golfer-score-inline.over { background: rgba(192,57,43,0.3); color: #e07a7a; }
  .golfer-score-inline.even { background: rgba(245,240,232,0.1); color: rgba(245,240,232,0.6); }

  .prize-label { font-family: 'Montserrat', sans-serif; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: rgba(245,240,232,0.3); }
  .lb-table { width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 12px; }
  .lb-table th { background: rgba(45,107,71,0.4); color: var(--masters-gold); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(201,168,76,0.3); font-weight: 600; }
  .lb-table td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(245,240,232,0.75); vertical-align: middle; }

  .lb-table tr.owned-t2 td { border-left: 3px solid #7ec99a; background: rgba(45,107,71,0.08); }
  .lb-pos { font-weight: 600; color: var(--masters-cream); width: 40px; }
  .lb-name { font-weight: 500; color: var(--masters-cream); }
  .lb-owner-badge { font-size: 9px; padding: 2px 7px; border-radius: 2px; font-weight: 600; letter-spacing: 0.5px; margin-left: 6px; }
  .badge-t1 { background: rgba(201,168,76,0.2); color: var(--masters-gold); border: 1px solid rgba(201,168,76,0.4); }
  .badge-t2 { background: rgba(126,201,154,0.15); color: #7ec99a; border: 1px solid rgba(126,201,154,0.3); }
  .score-val { font-weight: 600; font-size: 13px; }
  .score-val.under { color: #7ec99a; }
  .score-val.over { color: #e07a7a; }
  .score-val.even { color: var(--masters-cream); }
  .score-val.cut { color: rgba(245,240,232,0.3); }
  .thru-col { color: rgba(245,240,232,0.5); font-size: 11px; }
  .alert-banner {
    background: linear-gradient(90deg, rgba(192,57,43,0.2), rgba(192,57,43,0.05));
    border: 1px solid rgba(192,57,43,0.5); border-left: 4px solid var(--red-light);
    padding: 12px 18px; margin-bottom: 20px;
    font-family: 'Montserrat', sans-serif; font-size: 12px; color: #e07a7a;
    display: none; align-items: center; gap: 10px;
  }
  .alert-banner.show { display: flex; }
  .loading-state { text-align: center; padding: 60px 20px; font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 2px; color: rgba(245,240,232,0.4); text-transform: uppercase; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid rgba(201,168,76,0.2); border-top-color: var(--masters-gold); border-radius: 50%; margin: 0 auto 16px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(201,168,76,0.25); }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: rgba(245,240,232,0.45); font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
  .tab-btn.active { color: var(--masters-gold); border-bottom-color: var(--masters-gold); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent); margin: 28px 0; }
  @media (max-width: 700px) {
    .player-card { grid-template-columns: 30px 1fr auto auto; }
    .win-prob-col { display: none; }
    .best-score-num { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-badge">Augusta National · 2025</div>
  <h1>The <span>Masters</span> Tracker</h1>
  <div class="header-sub">Friend Group · $100 Pool</div>
  <div class="header-controls">
    <div class="live-badge"><span class="live-dot"></span> Live Scores</div>
    <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
  </div>
  <div class="last-updated" id="lastUpdated">Fetching scores…</div>
</header>

<div class="container">
  <div class="alert-banner" id="tier2Alert">
    <span style="font-size:18px">🚨</span>
    <span id="tier2AlertText"></span>
  </div>

  <div class="pots-row">
    <div class="pot-card">
      <div class="pot-label">Tier 1 Prize</div>
      <div class="pot-amount">$75</div>
      <div class="pot-leader" id="pot1Leader">Loading…</div>
    </div>
    <div class="pot-card">
      <div class="pot-label">Tier 2 Prize</div>
      <div class="pot-amount">$25 <span style="font-size:14px;color:rgba(245,240,232,0.5)">/ $100*</span></div>
      <div class="pot-leader" id="pot2Leader">Loading…</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event,'standings')">Standings</button>
    <button class="tab-btn" onclick="switchTab(event,'leaderboard')">Full Leaderboard</button>
  </div>

  <div class="tab-panel active" id="tab-standings">
    <div class="standings-section">
      <div class="section-title">Tier 1 Standings <span class="pill">$75 Prize</span></div>
      <div class="standings-grid" id="tier1Standings"><div class="loading-state"><div class="loading-spinner"></div>Loading scores…</div></div>
    </div>
    <div class="divider-line"></div>
    <div class="standings-section">
      <div class="section-title">Tier 2 Standings <span class="pill">$25 · $100 if overall winner</span></div>
      <div class="standings-grid" id="tier2Standings"><div class="loading-state"><div class="loading-spinner"></div>Loading scores…</div></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-leaderboard">
    <div class="section-title">Official Leaderboard</div>
    <div id="fullLeaderboard"><div class="loading-state"><div class="loading-spinner"></div>Loading…</div></div>
  </div>
</div>

<script>
const TIER1 = {
  "Big Mo": ["Akshay Bhatia","Brian Harman","Brooks Koepka","Jon Rahm","Kurt Kitayama","Rasmus Højgaard"],
  "Clint":  ["J.J. Spaun","Matt Fitzpatrick","Patrick Cantlay","Patrick Reed","Ryan Fox","Ryan Gerard"],
  "Nic":    ["Bryson DeChambeau","Cameron Smith","Chris Gotterup","Gary Woodland","Sergio Garcia","Viktor Hovland"],
  "Nick":   ["Daniel Berger","Harris English","Jordan Spieth","Maverick McNealy","Rory McIlroy","Wyndham Clark"],
  "Ty":     ["Dustin Johnson","Marco Penge","Nicolai Højgaard","Russell Henley","Scottie Scheffler","Sungjae Im"],
  "Coop":   ["Alex Noren","Casey Jarvis","Collin Morikawa","Jacob Bridgeman","Ludvig Åberg","Shane Lowry"],
  "Tim":    ["Cameron Young","Corey Conners","Justin Thomas","Max Homa","Min Woo Lee","Sam Stevens"],
  "Tommy":  ["Adam Scott","Justin Rose","Keegan Bradley","Kristoffer Reitan","Tommy Fleetwood","Tyrrell Hatton"],
  "Travis": ["Aldrich Potgieter","Harry Hall","Hideki Matsuyama","Jason Day","Robert MacIntyre","Sepp Straka"],
  "Vince":  ["Aaron Rai","Ben Griffin","Jake Knapp","Sam Burns","Si Woo Kim","Xander Schauffele"]
};
const TIER2 = {
  "Big Mo": ["Angel Cabrera","Michael Kim","Vijay Singh"],
  "Clint":  ["Bubba Watson","Danny Willett","Matt McCarty"],
  "Nic":    ["Brian Campbell","Carlos Ortiz","Mason Howell"],
  "Nick":   ["Davis Riley","Jose Maria Olazabal","Max Greyserman"],
  "Coop":   ["Charl Schwartzel","Haotong Li","Naoyuki Kataoka"],
  "Tim":    ["Jackson Herrington","John Keefer","Rasmus Neergaard-Petersen"],
  "Tommy":  ["Andrew Novak","Fred Couples","Michael Brennan"],
  "Travis": ["Mateo Pulcini","Sami Valimaki","Tom McKibbin"],
  "Ty":     ["Ethan Fang","Fifa Laopakdee","Nicolas Echavarria"],
  "Vince":  ["Brandon Holtz","Nick Taylor","Zach Johnson"]
};

let leaderboardData = [];
const REFRESH_INTERVAL = 90000;

async function fetchData() {
  document.getElementById("lastUpdated").textContent = "Fetching scores…";
  const endpoints = [
    "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga&event=401811941
",
    "https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard"
  ];
  const proxies = [
    u => "https://corsproxy.io/?" + encodeURIComponent(u),
    u => "https://api.allorigins.win/get?url=" + encodeURIComponent(u),
    u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u)
  ];

  for (const endpoint of endpoints) {
    for (const makeProxy of proxies) {
      try {
        const r = await fetch(makeProxy(endpoint));
        if (!r.ok) continue;
        const text = await r.text();
        const parsed = JSON.parse(text);
        const raw = parsed.contents ? JSON.parse(parsed.contents) : parsed;

        // Find the event data
        let eventObj = null;
        if (raw?.events) {
          eventObj = raw.events.find(e =>
            (e.name||"").toLowerCase().includes("master") ||
            (e.shortName||"").toLowerCase().includes("master")
          ) || raw.events[0];
        } else if (raw?.competitions) {
          eventObj = raw;
        }

        const competitors = eventObj?.competitions?.[0]?.competitors;
        if (competitors?.length) {
          processData(competitors);
          return;
        }
      } catch(e) { /* try next */ }
    }
  }

  document.getElementById("lastUpdated").textContent =
    "⚠ No scores yet — tournament starts Thursday. Will auto-refresh.";
  if (!leaderboardData.length) renderNoData();
}

function processData(competitors) {
  leaderboardData = competitors.map(c => {
    const score = c.score?.displayValue ?? "E";
    const status = c.status?.type?.name || "";
    const cut = status.includes("CUT") || c.status?.type?.id === "6";
    return {
      name: norm(c.athlete?.displayName || ""),
      score: parseScore(score),
      thru: c.status?.thru ?? c.status?.displayValue ?? "--",
      rounds: (c.linescores||[]).map(r => r.displayValue),
      position: c.status?.position?.displayValue || "--",
      cut
    };
  }).sort((a,b) => {
    if (a.cut && !b.cut) return 1;
    if (!a.cut && b.cut) return -1;
    return a.score - b.score;
  });
  document.getElementById("lastUpdated").textContent = "Updated: " + new Date().toLocaleTimeString();
  render();
}

function parseScore(s) {
  if (!s || s==="E" || s==="0") return 0;
  const n = parseInt(s.replace("+",""),10);
  return isNaN(n) ? 0 : n;
}

function norm(n) {
  return n.trim().replace(/\s+/g," ")
    .replace(/[øØ]/g,m=>m==="ø"?"o":"O")
    .replace(/[åÅ]/g,m=>m==="å"?"a":"A")
    .replace(/[éè]/g,"e").replace(/[áà]/g,"a")
    .replace(/[óò]/g,"o").replace(/ú/g,"u").replace(/ñ/g,"n");
}

function findPlayer(name) {
  const n = norm(name).toLowerCase();
  const last = n.split(" ").pop();
  return leaderboardData.find(p => {
    const pn = p.name.toLowerCase();
    const pl = pn.split(" ").pop();
    return pn === n || pl === last;
  }) || null;
}

function fmtScore(s) {
  if (s===null||s===undefined) return "–";
  if (s===0) return "E";
  return s>0?"+"+s:""+s;
}

function scoreClass(s) {
  if (s===null||s===undefined) return "nd";
  return s<0?"under":s>0?"over":"even";
}

function getRoundsComplete() {
  if (!leaderboardData.length) return 0;
  const thrus = leaderboardData.filter(p=>!p.cut).map(p=>{
    if (p.thru==="F"||p.thru==="18") return 18;
    const n=parseInt(p.thru,10); return isNaN(n)?0:n;
  });
  if (!thrus.length) return 0;
  const avg = thrus.reduce((a,b)=>a+b,0)/thrus.length;
  const fromRounds = Math.max(...leaderboardData.map(p=>(p.rounds||[]).length));
  return Math.max(Math.floor(avg/18), fromRounds>0?fromRounds-1:0);
}

function gaussRandom() {
  return Math.sqrt(-2*Math.log(1-Math.random()))*Math.cos(2*Math.PI*Math.random());
}

function estimateWinProb(myScore, allScores, roundsComplete) {
  if (!allScores.length) return null;
  const remaining = Math.max(0, 4-roundsComplete);
  const sd = 3.0 * Math.sqrt(remaining+0.5);
  let wins = 0;
  const N = 3000;
  for (let i=0;i<N;i++) {
    const myFinal = myScore + gaussRandom()*sd;
    let won = true;
    for (const opp of allScores) {
      if (opp===myScore) continue;
      if (opp+gaussRandom()*sd <= myFinal) { won=false; break; }
    }
    if (won) wins++;
  }
  return (wins/N)*100;
}

function buildParticipants(roster) {
  const rc = getRoundsComplete();
  const parts = Object.entries(roster).map(([name,golfers])=>{
    const pdata = golfers.map(g=>findPlayer(g));
    const scores = pdata.map(p=>p&&!p.cut?p.score:null);
    const valid = scores.filter(s=>s!==null);
    const best = valid.length ? Math.min(...valid) : null;
    return {name,golfers,pdata,scores,best,rc};
  });
  const bests = parts.map(p=>p.best).filter(s=>s!==null);
  parts.forEach(p=>{
    p.prob = p.best!==null ? estimateWinProb(p.best,bests,rc) : null;
  });
  return parts.sort((a,b)=>{
    if (a.best===null&&b.best===null) return 0;
    if (a.best===null) return 1;
    if (b.best===null) return -1;
    return a.best-b.best;
  });
}

function render() {
  const t1 = buildParticipants(TIER1);
  const t2 = buildParticipants(TIER2);
  renderPots(t1,t2);
  renderGrid("tier1Standings",t1,75);
  renderGrid("tier2Standings",t2,25);
  renderLeaderboard();
  checkAlert();
}

function renderNoData() {
  const msg='<div class="loading-state">⚠ Tournament hasn\'t started yet — check back Thursday!</div>';
  ["tier1Standings","tier2Standings","fullLeaderboard"].forEach(id=>{
    document.getElementById(id).innerHTML=msg;
  });
}

function renderPots(t1,t2) {
  const l1=t1[0], l2=t2[0];
  document.getElementById("pot1Leader").innerHTML = l1?.best!==null
    ? `Current leader: <strong>${l1.name}</strong> (${fmtScore(l1.best)})` : "No scores yet";
  document.getElementById("pot2Leader").innerHTML = l2?.best!==null
    ? `Current leader: <strong>${l2.name}</strong> (${fmtScore(l2.best)})` : "No scores yet";
}

function checkAlert() {
  if (!leaderboardData.length) return;
  const leader = leaderboardData[0];
  const t2names = Object.values(TIER2).flat().map(n=>norm(n).toLowerCase().split(" ").pop());
  const leaderLast = leader.name.toLowerCase().split(" ").pop();
  const alertEl = document.getElementById("tier2Alert");
  if (t2names.includes(leaderLast)) {
    let owner="";
    for (const [p,gs] of Object.entries(TIER2)) {
      if (gs.map(n=>norm(n).toLowerCase().split(" ").pop()).includes(leaderLast)) { owner=p; break; }
    }
    document.getElementById("tier2AlertText").textContent =
      `🏆 ${leader.name} (${fmtScore(leader.score)}) is a Tier 2 golfer owned by ${owner} and is LEADING THE TOURNAMENT! If they win, ${owner} takes the full $100!`;
    alertEl.classList.add("show");
  } else {
    alertEl.classList.remove("show");
  }
}

function renderGrid(id, parts, prize) {
  const el = document.getElementById(id);
  const maxProb = Math.max(...parts.filter(p=>p.prob!=null).map(p=>p.prob),1);
  el.innerHTML = parts.map((p,i)=>{
    const rank=i+1;
    const sc=scoreClass(p.best);
    const probPct = p.prob!=null ? p.prob.toFixed(1)+"%" : "–%";
    const probBar = p.prob!=null ? Math.min(100,(p.prob/maxProb)*100) : 0;
    const ghtml = p.golfers.map((g,idx)=>{
      const pd=p.pdata[idx], gs=p.scores[idx];
      let cls="even";
      if (pd&&pd.cut) cls="cut";
      else if (gs!==null&&gs<0) cls="under";
      else if (gs!==null&&gs>0) cls="over";
      const lbl=gs!==null?fmtScore(gs):(pd?"--":"DNS");
      return `<span class="golfer-tag">${g} <span class="golfer-score-inline ${cls}">${lbl}</span></span>`;
    }).join(" ");
    return `<div class="player-card rank-${rank>3?'other':rank}">
      <div class="rank-num">${rank}</div>
      <div class="player-info">
        <div class="player-name-main">${p.name}</div>
        <div class="player-golfers">${ghtml}</div>
      </div>
      <div class="win-prob-col">
        <div class="win-prob-bar-wrap"><div class="win-prob-bar" style="width:${probBar}%"></div></div>
        <div class="win-prob-pct">${probPct}</div>
        <div class="win-prob-label">Win odds</div>
      </div>
      <div class="player-best-score">
        <div class="best-score-num ${sc}">${p.best!==null?fmtScore(p.best):"–"}</div>
        <div class="best-score-label">Best score</div>
      </div>
      <div class="prize-col">
        <div class="prize-amt">${rank===1?'$'+prize:'–'}</div>
        <div class="prize-label">${rank===1?'leads':'prize'}</div>
      </div>
    </div>`;
  }).join("");
}

function renderLeaderboard() {
  const el = document.getElementById("fullLeaderboard");
  if (!leaderboardData.length) { el.innerHTML='<div class="loading-state">No data yet</div>'; return; }
  const t1map={}, t2map={};
  for (const [owner,gs] of Object.entries(TIER1)) gs.forEach(g=>t1map[norm(g).toLowerCase().split(" ").pop()]=owner);
  for (const [owner,gs] of Object.entries(TIER2)) gs.forEach(g=>t2map[norm(g).toLowerCase().split(" ").pop()]=owner);
  const rows = leaderboardData.map(p=>{
    const last=p.name.toLowerCase().split(" ").pop();
    const t1o=t1map[last], t2o=t2map[last];
    const tier=t1o?1:t2o?2:0;
    const owner=t1o||t2o||"";
    const cls=tier?`owned-t${tier}`:"";
    const badge=tier?`<span class="lb-owner-badge badge-t${tier}">${owner} · T${tier}</span>`:"";
    const sc=p.cut?"cut":scoreClass(p.score);
    const sd=p.cut?"CUT":fmtScore(p.score);
    const rounds=(p.rounds||[]).join(" · ")||"--";
    return `<tr class="${cls}"><td class="lb-pos">${p.position}</td><td class="lb-name">${p.name}${badge}</td><td class="score-val ${sc}">${sd}</td><td class="thru-col">${p.cut?"CUT":p.thru}</td><td class="thru-col" style="font-size:11px;color:rgba(245,240,232,0.4)">${rounds}</td></tr>`;
  }).join("");
  el.innerHTML=`<table class="lb-table"><thead><tr><th>Pos</th><th>Player</th><th>Score</th><th>Thru</th><th>Rounds</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function switchTab(e,name) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  e.target.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
}

fetchData();
setInterval(fetchData, REFRESH_INTERVAL);
</script>
</body>
</html>
