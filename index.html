<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Masters 2026 — Friend Group Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a4a2e;--green-mid:#2d6b47;--green-light:#3d8b5e;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f5f0e8;--dark:#0d2417;--red:#c0392b;--red-light:#e74c3c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);background-image:radial-gradient(ellipse at 20% 20%,rgba(45,107,71,.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(26,74,46,.3) 0%,transparent 60%);color:var(--cream);font-family:'EB Garamond',Georgia,serif;min-height:100vh;}
  header{background:linear-gradient(180deg,#0a1a0f 0%,var(--dark) 100%);border-bottom:2px solid var(--gold);padding:24px 20px 16px;text-align:center;}
  .header-badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:4px 14px;margin-bottom:10px;}
  header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,48px);font-weight:700;color:var(--cream);}
  header h1 span{color:var(--gold);font-style:italic;}
  .header-sub{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold-light);margin-top:4px;text-transform:uppercase;opacity:.8;}
  .header-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(192,57,43,.15);border:1px solid var(--red);color:var(--red-light);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;}
  .live-dot{width:7px;height:7px;background:var(--red-light);border-radius:50%;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .refresh-btn{background:none;border:1px solid rgba(201,168,76,.35);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;cursor:pointer;}
  .last-updated{font-family:'Montserrat',sans-serif;font-size:10px;color:rgba(245,240,232,.45);margin-top:6px;letter-spacing:1px;}
  .container{max-width:1400px;margin:0 auto;padding:24px 16px 60px;}
  .pots-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
  @media(max-width:600px){.pots-row{grid-template-columns:1fr;}}
  .pot-card{background:linear-gradient(135deg,rgba(45,107,71,.25),rgba(13,36,23,.6));border:1px solid rgba(201,168,76,.35);padding:20px 24px;text-align:center;position:relative;}
  .pot-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .pot-label{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .pot-amount{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--gold-light);}
  .pot-leader{font-size:13px;color:rgba(245,240,232,.7);margin-top:4px;font-style:italic;}
  .pot-leader strong{color:var(--cream);font-style:normal;}
  .tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(201,168,76,.25);}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:rgba(245,240,232,.45);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;cursor:pointer;margin-bottom:-1px;transition:all .2s;}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab-panel{display:none;}.tab-panel.active{display:block;}
  .section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--gold);border-bottom:1px solid rgba(201,168,76,.3);padding-bottom:10px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .pill{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;background:var(--green);color:var(--gold);padding:3px 10px;border:1px solid rgba(201,168,76,.4);}
  .standings-section{margin-bottom:36px;}
  .standings-grid{display:grid;gap:10px;}
  .player-card{background:rgba(13,36,23,.7);border:1px solid rgba(201,168,76,.15);padding:14px 18px;display:grid;grid-template-columns:36px 1fr auto auto auto;align-items:center;gap:12px;transition:border-color .2s,background .2s;}
  .player-card:hover{border-color:rgba(201,168,76,.4);background:rgba(26,74,46,.3);}
  .player-card.rank-1{border-color:rgba(201,168,76,.6);background:rgba(45,107,71,.3);}
  .player-card.rank-2{border-color:rgba(201,168,76,.35);}
  .player-card.rank-3{border-color:rgba(201,168,76,.25);}
  .rank-num{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:600;color:var(--gold);text-align:center;opacity:.8;}
  .rank-1 .rank-num{opacity:1;font-size:22px;}
  .player-info{min-width:0;}
  .player-name-main{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-golfers{font-family:'Montserrat',sans-serif;font-size:10px;color:rgba(245,240,232,.5);margin-top:3px;line-height:1.6;}
  .gtag{display:inline-block;margin-right:4px;margin-bottom:2px;}
  .gs{font-size:10px;font-family:'Montserrat',sans-serif;padding:1px 5px;border-radius:2px;}
  .gs.under{background:rgba(45,107,71,.5);color:#7ec99a;}
  .gs.over{background:rgba(192,57,43,.3);color:#e07a7a;}
  .gs.even{background:rgba(245,240,232,.1);color:rgba(245,240,232,.6);}
  .gs.cut{background:rgba(100,100,100,.3);color:rgba(245,240,232,.4);text-decoration:line-through;}
  .gs.nd{background:rgba(100,100,100,.2);color:rgba(245,240,232,.3);}
  .player-best-score{text-align:right;}
  .bsn{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;}
  .bsn.under{color:#7ec99a;}.bsn.over{color:#e07a7a;}.bsn.even{color:var(--cream);}.bsn.nd{color:rgba(245,240,232,.3);font-size:18px;}
  .bsl{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.4);}
  .win-prob-col{text-align:center;min-width:70px;}
  .wpbw{width:60px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 3px;overflow:hidden;}
  .wpb{height:100%;background:linear-gradient(90deg,var(--green-light),var(--gold));border-radius:2px;transition:width .8s;}
  .wpp{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;color:var(--gold-light);}
  .wpl{font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.35);}
  .prize-col{text-align:center;min-width:52px;}
  .prize-amt{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:var(--gold);}
  .prize-lbl{font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.3);}
  .alert-banner{background:linear-gradient(90deg,rgba(192,57,43,.2),rgba(192,57,43,.05));border:1px solid rgba(192,57,43,.5);border-left:4px solid var(--red-light);padding:12px 18px;margin-bottom:20px;font-family:'Montserrat',sans-serif;font-size:12px;color:#e07a7a;display:none;align-items:center;gap:10px;}
  .alert-banner.show{display:flex;}
  .lb-table{width:100%;border-collapse:collapse;font-family:'Montserrat',sans-serif;font-size:12px;}
  .lb-table th{background:rgba(45,107,71,.4);color:var(--gold);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid rgba(201,168,76,.3);font-weight:600;}
  .lb-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(245,240,232,.75);vertical-align:middle;}
  .lb-table tr:hover td{background:rgba(45,107,71,.15);}
  .lb-table tr.owned-t1 td{border-left:3px solid var(--gold);background:rgba(45,107,71,.12);}
  .lb-table tr.owned-t2 td{border-left:3px solid #7ec99a;background:rgba(45,107,71,.08);}
  .lbpos{font-weight:600;color:var(--cream);width:40px;}
  .lbname{font-weight:500;color:var(--cream);}
  .ownbadge{font-size:9px;padding:2px 7px;border-radius:2px;font-weight:600;letter-spacing:.5px;margin-left:6px;}
  .bt1{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4);}
  .bt2{background:rgba(126,201,154,.15);color:#7ec99a;border:1px solid rgba(126,201,154,.3);}
  .sv{font-weight:600;font-size:13px;}
  .sv.under{color:#7ec99a;}.sv.over{color:#e07a7a;}.sv.even{color:var(--cream);}.sv.cut{color:rgba(245,240,232,.3);}
  .thru{color:rgba(245,240,232,.5);font-size:11px;}
  .loading-state{text-align:center;padding:60px 20px;font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:2px;color:rgba(245,240,232,.4);text-transform:uppercase;}
  .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);margin:28px 0;}
  @media(max-width:700px){.player-card{grid-template-columns:30px 1fr auto auto;}.win-prob-col{display:none;}.bsn{font-size:22px;}}
</style>
</head>
<body>
<header>
  <div class="header-badge">Augusta National · 2026</div>
  <h1>The <span>Masters</span> Tracker</h1>
  <div class="header-sub">Friend Group · $100 Pool</div>
  <div class="header-controls">
    <div class="live-badge"><span class="live-dot"></span> Live Scores</div>
    <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
  </div>
  <div class="last-updated" id="lastUpdated">Fetching scores…</div>
</header>

<div class="container">
  <div class="alert-banner" id="tier2Alert">
    <span style="font-size:18px">🚨</span>
    <span id="tier2AlertText"></span>
  </div>
  <div class="pots-row">
    <div class="pot-card">
      <div class="pot-label">Tier 1 Prize</div>
      <div class="pot-amount">$75</div>
      <div class="pot-leader" id="pot1Leader">Loading…</div>
    </div>
    <div class="pot-card">
      <div class="pot-label">Tier 2 Prize</div>
      <div class="pot-amount">$25 <span style="font-size:14px;color:rgba(245,240,232,.4)">/ $100*</span></div>
      <div class="pot-leader" id="pot2Leader">Loading…</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event,'standings')">Standings</button>
    <button class="tab-btn" onclick="switchTab(event,'leaderboard')">Full Leaderboard</button>
  </div>
  <div class="tab-panel active" id="tab-standings">
    <div class="standings-section">
      <div class="section-title">Tier 1 Standings <span class="pill">$75 Prize</span></div>
      <div class="standings-grid" id="tier1Standings"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="divider"></div>
    <div class="standings-section">
      <div class="section-title">Tier 2 Standings <span class="pill">$25 · $100 if overall winner</span></div>
      <div class="standings-grid" id="tier2Standings"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
  <div class="tab-panel" id="tab-leaderboard">
    <div class="section-title">Official Leaderboard</div>
    <div id="fullLeaderboard"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
  </div>
</div>

<script>
const TIER1 = {
  "Big Mo":["Akshay Bhatia","Brian Harman","Brooks Koepka","Jon Rahm","Kurt Kitayama","Rasmus Hojgaard"],
  "Clint": ["J.J. Spaun","Matt Fitzpatrick","Patrick Cantlay","Patrick Reed","Ryan Fox","Ryan Gerard"],
  "Nic":   ["Bryson DeChambeau","Cameron Smith","Chris Gotterup","Gary Woodland","Sergio Garcia","Viktor Hovland"],
  "Nick":  ["Daniel Berger","Harris English","Jordan Spieth","Maverick McNealy","Rory McIlroy","Wyndham Clark"],
  "Ty":    ["Dustin Johnson","Marco Penge","Nicolai Hojgaard","Russell Henley","Scottie Scheffler","Sungjae Im"],
  "Coop":  ["Alex Noren","Casey Jarvis","Collin Morikawa","Jacob Bridgeman","Ludvig Aberg","Shane Lowry"],
  "Tim":   ["Cameron Young","Corey Conners","Justin Thomas","Max Homa","Min Woo Lee","Sam Stevens"],
  "Tommy": ["Adam Scott","Justin Rose","Keegan Bradley","Kristoffer Reitan","Tommy Fleetwood","Tyrrell Hatton"],
  "Travis":["Aldrich Potgieter","Harry Hall","Hideki Matsuyama","Jason Day","Robert MacIntyre","Sepp Straka"],
  "Vince": ["Aaron Rai","Ben Griffin","Jake Knapp","Sam Burns","Si Woo Kim","Xander Schauffele"]
};
const TIER2 = {
  "Big Mo":["Angel Cabrera","Michael Kim","Vijay Singh"],
  "Clint": ["Bubba Watson","Danny Willett","Matt McCarty"],
  "Nic":   ["Brian Campbell","Carlos Ortiz","Mason Howell"],
  "Nick":  ["Davis Riley","Jose Maria Olazabal","Max Greyserman"],
  "Coop":  ["Charl Schwartzel","Haotong Li","Naoyuki Kataoka"],
  "Tim":   ["Jackson Herrington","John Keefer","Rasmus Neergaard-Petersen"],
  "Tommy": ["Andrew Novak","Fred Couples","Michael Brennan"],
  "Travis":["Mateo Pulcini","Sami Valimaki","Tom McKibbin"],
  "Ty":    ["Ethan Fang","Fifa Laopakdee","Nicolas Echavarria"],
  "Vince": ["Brandon Holtz","Nick Taylor","Zach Johnson"]
};

let LB = [];

function normName(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim().replace(/\s+/g," ");
}
function lastName(s) { return normName(s).split(" ").pop(); }

function buildLookup() {
  const map = {};
  for (const [owner,gs] of Object.entries(TIER1)) gs.forEach(g => map[lastName(g)] = {owner,tier:1});
  for (const [owner,gs] of Object.entries(TIER2)) gs.forEach(g => map[lastName(g)] = {owner,tier:2});
  return map;
}

function findPlayer(rosterName) {
  const fn = normName(rosterName), ln = lastName(rosterName);
  return LB.find(p => normName(p.rawName) === fn) || LB.find(p => lastName(p.rawName) === ln) || null;
}

const ESPN_EVENT = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga&event=401811941";
const ESPN_PGA   = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard";
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchData() {
  document.getElementById("lastUpdated").textContent = "Fetching scores…";
  for (const ep of [ESPN_EVENT, ESPN_PGA]) {
    for (const px of PROXIES) {
      try {
        const r = await fetch(px(ep));
        if (!r.ok) continue;
        const txt = await r.text();
        if (!txt || txt.length < 100) continue;
        const parsed = JSON.parse(txt);
        const raw = parsed.contents ? JSON.parse(parsed.contents) : parsed;
        let comps = null;
        if (raw?.competitions?.[0]?.competitors?.length) {
          comps = raw.competitions[0].competitors;
        } else if (raw?.events?.length) {
          for (const ev of raw.events) {
            const c = ev?.competitions?.[0]?.competitors;
            if (!c?.length) continue;
            const isMasters = (ev.name||ev.shortName||"").toLowerCase().includes("master");
            if (isMasters || !comps) comps = c;
            if (isMasters) break;
          }
        }
        if (comps?.length) { ingest(comps); return; }
      } catch(e) {}
    }
  }
  document.getElementById("lastUpdated").textContent = "⚠ Could not load scores. Tap ↻ to retry.";
  if (!LB.length) noData();
}

function ingest(comps) {
  LB = comps.map(c => {
    const sc = c.score?.displayValue ?? "E";
    const status = c.status?.type?.name || "";
    const cut = status.includes("CUT") || c.status?.type?.id === "6";
    return {
      rawName: c.athlete?.displayName || "",
      score: parseSc(sc),
      thru: c.status?.thru ?? c.status?.displayValue ?? "--",
      rounds: (c.linescores||[]).map(r => r.displayValue),
      pos: c.status?.position?.displayValue || "--",
      cut
    };
  }).sort((a,b) => { if(a.cut&&!b.cut)return 1; if(!a.cut&&b.cut)return -1; return a.score-b.score; });
  document.getElementById("lastUpdated").textContent = "Updated: " + new Date().toLocaleTimeString() + " · Auto-refreshes every 2 min";
  render();
}

const parseSc = s => { if(!s||s==="E"||s==="0")return 0; const n=parseInt(s.replace("+",""),10); return isNaN(n)?0:n; };
const fmtSc   = s => s===null?"–":s===0?"E":s>0?"+"+s:""+s;
const scCls   = s => s===null?"nd":s<0?"under":s>0?"over":"even";

function gaussRnd() { return Math.sqrt(-2*Math.log(1-Math.random()))*Math.cos(2*Math.PI*Math.random()); }

function roundsDone() {
  if (!LB.length) return 0;
  const thrus = LB.filter(p=>!p.cut).map(p => { if(p.thru==="F"||p.thru==="18")return 18; const n=parseInt(p.thru,10); return isNaN(n)?0:n; });
  const avg = thrus.length ? thrus.reduce((a,b)=>a+b,0)/thrus.length : 0;
  const maxR = Math.max(...LB.map(p=>(p.rounds||[]).length),0);
  return Math.max(Math.floor(avg/18), maxR>0?maxR-1:0);
}

function winProb(myScore, allScores, rd) {
  if (!allScores.length) return null;
  const sd = 3.0*Math.sqrt(Math.max(0,4-rd)+0.5);
  let wins=0; const N=3000;
  for (let i=0;i<N;i++) {
    const me=myScore+gaussRnd()*sd; let w=true;
    for (const o of allScores) { if(o!==myScore&&o+gaussRnd()*sd<=me){w=false;break;} }
    if(w) wins++;
  }
  return wins/N*100;
}

function buildParts(roster) {
  const rd = roundsDone();
  const parts = Object.entries(roster).map(([name,golfers]) => {
    const pdata  = golfers.map(g => findPlayer(g));
    const scores = pdata.map(p => (p&&!p.cut) ? p.score : null);
    const valid  = scores.filter(s => s!==null);
    const best   = valid.length ? Math.min(...valid) : null;
    return {name,golfers,pdata,scores,best};
  });
  const bests = parts.map(p=>p.best).filter(s=>s!==null);
  parts.forEach(p => { p.prob = p.best!==null ? winProb(p.best,bests,rd) : null; });
  return parts.sort((a,b) => { if(a.best===null&&b.best===null)return 0; if(a.best===null)return 1; if(b.best===null)return -1; return a.best-b.best; });
}

function render() {
  const t1=buildParts(TIER1), t2=buildParts(TIER2);
  const l1=t1[0], l2=t2[0];
  document.getElementById("pot1Leader").innerHTML = l1?.best!==null ? `Current leader: <strong>${l1.name}</strong> (${fmtSc(l1.best)})` : "No scores yet";
  document.getElementById("pot2Leader").innerHTML = l2?.best!==null ? `Current leader: <strong>${l2.name}</strong> (${fmtSc(l2.best)})` : "No scores yet";
  renderGrid("tier1Standings",t1,75);
  renderGrid("tier2Standings",t2,25);
  renderLB();
  checkAlert();
}

function noData() {
  const m='<div class="loading-state">⚠ No scores available. Tap ↻ Refresh to try again.</div>';
  ["tier1Standings","tier2Standings","fullLeaderboard"].forEach(id=>document.getElementById(id).innerHTML=m);
}

function renderGrid(id, parts, prize) {
  const maxP=Math.max(...parts.filter(p=>p.prob!=null).map(p=>p.prob),1);
  document.getElementById(id).innerHTML = parts.map((p,i) => {
    const rank=i+1, sc=scCls(p.best);
    const pct=p.prob!=null?p.prob.toFixed(1)+"%":"–%";
    const bar=p.prob!=null?Math.min(100,p.prob/maxP*100):0;
    const ghtml=p.golfers.map((g,idx)=>{
      const pd=p.pdata[idx], gs=p.scores[idx];
      const cls=pd?(pd.cut?"cut":scCls(gs)):"nd";
      const lbl=gs!==null?fmtSc(gs):(pd?"--":"N/A");
      return `<span class="gtag">${g} <span class="gs ${cls}">${lbl}</span></span>`;
    }).join(" ");
    return `<div class="player-card rank-${rank>3?'other':rank}">
      <div class="rank-num">${rank}</div>
      <div class="player-info">
        <div class="player-name-main">${p.name}</div>
        <div class="player-golfers">${ghtml}</div>
      </div>
      <div class="win-prob-col">
        <div class="wpbw"><div class="wpb" style="width:${bar}%"></div></div>
        <div class="wpp">${pct}</div><div class="wpl">Win odds</div>
      </div>
      <div class="player-best-score">
        <div class="bsn ${sc}">${p.best!==null?fmtSc(p.best):"–"}</div>
        <div class="bsl">Best score</div>
      </div>
      <div class="prize-col">
        <div class="prize-amt">${rank===1?'$'+prize:'–'}</div>
        <div class="prize-lbl">${rank===1?'leads':'prize'}</div>
      </div>
    </div>`;
  }).join("");
}

function renderLB() {
  if (!LB.length) { document.getElementById("fullLeaderboard").innerHTML='<div class="loading-state">No data yet</div>'; return; }
  const lookup=buildLookup();
  const rows=LB.map(p=>{
    const info=lookup[lastName(p.rawName)];
    const badge=info?`<span class="ownbadge bt${info.tier}">${info.owner} · T${info.tier}</span>`:"";
    const cls=info?`owned-t${info.tier}`:"";
    const sc=p.cut?"cut":scCls(p.score);
    const rounds=(p.rounds||[]).join(" · ")||"--";
    return `<tr class="${cls}">
      <td class="lbpos">${p.pos}</td>
      <td class="lbname">${p.rawName}${badge}</td>
      <td class="sv ${sc}">${p.cut?"CUT":fmtSc(p.score)}</td>
      <td class="thru">${p.cut?"CUT":p.thru}</td>
      <td class="thru" style="font-size:11px;color:rgba(245,240,232,.4)">${rounds}</td>
    </tr>`;
  }).join("");
  document.getElementById("fullLeaderboard").innerHTML=`<table class="lb-table"><thead><tr><th>Pos</th><th>Player</th><th>Score</th><th>Thru</th><th>Rounds</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function checkAlert() {
  if (!LB.length) return;
  const leader=LB[0], lookup=buildLookup();
  const info=lookup[lastName(leader.rawName)];
  const alertEl=document.getElementById("tier2Alert");
  if (info?.tier===2) {
    document.getElementById("tier2AlertText").textContent=`🏆 ${leader.rawName} (${fmtSc(leader.score)}) is a Tier 2 golfer owned by ${info.owner} and is LEADING THE TOURNAMENT! If they win, ${info.owner} takes the full $100!`;
    alertEl.classList.add("show");
  } else { alertEl.classList.remove("show"); }
}

function switchTab(e,name) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  e.target.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
}

fetchData();
setInterval(fetchData, 120000);
</script>
</body>
</html>
